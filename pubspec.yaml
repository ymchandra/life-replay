name: life_replay
description: An offline-first personal timeline and journaling app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flex_color_scheme: ^8.1.1
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  salomon_bottom_bar: ^3.3.2
  flutter_staggered_grid_view: ^0.7.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  iconsax: ^0.0.8
  geolocator: ^11.1.0
  google_maps_flutter: ^2.7.0
  geocoding: ^3.0.0
  photo_manager: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
